[build]

[target.wasm32-unknown-unknown]
# web_sys_unstable_apis: required by wgpu/bevy on the web.
# getrandom_backend="wasm_js": getrandom 0.3 needs an explicit backend on
# wasm32-unknown-unknown; pair it with the getrandom `wasm_js` feature (see
# Cargo.toml) so `rand` works in the browser.
rustflags = [
    "--cfg=web_sys_unstable_apis",
    "--cfg=getrandom_backend=\"wasm_js\"",
]
