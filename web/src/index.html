<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>bevy_common_systems - game showcase</title>
    <meta
      name="description"
      content="Playable WebAssembly builds of the bevy_common_systems example games."
    />
  </head>
  <body>
    <header class="site-header">
      <h1>bevy_common_systems</h1>
      <p>Playable WebAssembly builds of the example games.</p>
    </header>

    <main>
      <ul id="game-grid" class="game-grid" aria-label="Games"></ul>
    </main>

    <!-- Full-screen, scrollable game page (itch.io style): the game embed sits
         centered at a mobile-ish portrait size, with instructions below it. -->
    <div id="game-overlay" class="game-overlay" hidden>
      <div class="game-page">
        <div class="game-page__topbar">
          <button id="game-overlay-back" class="game-page__back" type="button">
            &larr; Back to games
          </button>
          <span id="game-overlay-title" class="game-page__title"></span>
        </div>

        <div class="game-embed">
          <iframe
            id="game-frame"
            class="game-embed__frame"
            title="Game"
            allow="autoplay; fullscreen; gamepad"
          ></iframe>
        </div>

        <section class="game-info">
          <h2 class="game-info__heading">How to play</h2>
          <p id="game-overlay-controls" class="game-info__controls"></p>
        </section>
      </div>
    </div>

    <footer class="site-footer">
      Built with <a href="https://bevyengine.org">Bevy</a> and
      <a href="https://trunkrs.dev">Trunk</a>.
    </footer>
  </body>
</html>
