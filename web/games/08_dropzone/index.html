<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, user-scalable=no"
    />
    <title>Drop Zone - bevy_common_systems</title>
    <!--
      Web Audio autoplay unlock for WebKit (iOS + macOS Safari).

      Bevy/cpal creates its AudioContext eagerly at startup, before any user
      gesture, so it comes up "suspended". Chrome and Firefox auto-resume it
      once the user interacts and a source node start()s, so no shim is needed
      there. WebKit does NOT auto-resume on start(): it needs an explicit
      resume() called inside a real user-gesture handler. Bevy does not expose
      its AudioContext from Rust, so we capture every context at construction
      (by wrapping the constructor) and resume them all on the first gesture.
      Without this, every SFX is silent on mobile Safari.

      This runs before trunk's injected wasm loader (it is earlier in <head>),
      so the wrapper is installed before Bevy constructs its context. Shared
      verbatim with 06_fruitninja; see docs/wasm-web-builds.md.
    -->
    <script>
      (function () {
        var Native = window.AudioContext || window.webkitAudioContext;
        if (!Native) return;

        // Every AudioContext Bevy/cpal builds gets recorded here.
        var contexts = [];
        function Wrapped() {
          var ctx = new (Function.prototype.bind.apply(
            Native,
            [null].concat([].slice.call(arguments))
          ))();
          contexts.push(ctx);
          return ctx;
        }
        Wrapped.prototype = Native.prototype;
        window.AudioContext = Wrapped;
        if (window.webkitAudioContext) window.webkitAudioContext = Wrapped;

        var events = ['pointerdown', 'touchend', 'mousedown', 'keydown'];
        function detachIfRunning() {
          var running =
            contexts.length > 0 &&
            contexts.every(function (c) {
              return c.state === 'running';
            });
          if (!running) return;
          events.forEach(function (type) {
            document.removeEventListener(type, unlock, true);
          });
        }
        function unlock() {
          contexts.forEach(function (ctx) {
            if (ctx.state === 'suspended' && ctx.resume) {
              ctx.resume().then(detachIfRunning, function () {});
            }
            // WebKit's stricter unlock wants an actual node start inside the
            // gesture; a 1-sample silent buffer is inaudible and does it.
            try {
              var src = ctx.createBufferSource();
              src.buffer = ctx.createBuffer(1, 1, ctx.sampleRate);
              src.connect(ctx.destination);
              src.start(0);
            } catch (e) {}
          });
          detachIfRunning();
        }
        events.forEach(function (type) {
          document.addEventListener(type, unlock, {
            capture: true,
            passive: true,
          });
        });
      })();
    </script>
    <!--
      Trunk builds the crate's `08_dropzone` example to wasm. The example is
      selected on the CLI with `--example 08_dropzone` (see build-games.sh);
      this link just points trunk at the crate root.
    -->
    <link data-trunk rel="rust" href="../../../Cargo.toml" data-wasm-opt="z" />
    <!--
      The game loads its sound effects with `asset_server.load("sounds/*.wav")`,
      which on wasm fetches `<public-url>assets/sounds/*.wav` at runtime. Trunk
      copies nothing by default, so stage the crate's `assets/sounds/` into the
      dist under `assets/sounds/` (data-target-path is relative to the dist
      dir; href is relative to this index.html -- `../../../` is the repo root).
      Without this the fetches 404 and every sound is silent. The starfield
      skybox is generated in code, so no image asset is needed. See
      docs/wasm-web-builds.md.
    -->
    <link
      data-trunk
      rel="copy-dir"
      href="../../../assets/sounds"
      data-target-path="assets/sounds"
    />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #0b0f1a;
        overflow: hidden;
      }
      /* The game targets this canvas and fits it to the parent (the body =
         the embedding iframe), so it renders at the iframe's aspect. */
      #game-canvas {
        display: block;
        width: 100%;
        height: 100%;
        outline: none;
      }
    </style>
  </head>
  <body>
    <canvas id="game-canvas"></canvas>
  </body>
</html>
