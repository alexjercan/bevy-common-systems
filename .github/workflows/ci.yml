name: CI

on:
  push:
  pull_request:

# Cancel superseded runs on the same ref to save runner time.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt / clippy / test / ascii
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Bevy needs ALSA and udev headers to build and link on Linux. The
      # examples are compiled by `cargo test` but never run, so the runtime
      # graphics stack (vulkan / x11) is not required. wayland IS required at
      # build time though: a transitive dep pulls in `wayland-sys`, whose
      # build script calls `pkg-config wayland-client` (from libwayland-dev)
      # and `xkbcommon` (from libxkbcommon-dev) to compile, so those headers
      # must be present even though nothing opens a window.
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            libasound2-dev libudev-dev libwayland-dev libxkbcommon-dev

      # rust-toolchain.toml pins nightly with rustfmt and clippy; install it
      # explicitly so failures are clear and the first cargo call is not slow.
      - name: Install Rust nightly toolchain
        run: rustup toolchain install nightly --profile minimal -c rustfmt -c clippy

      - uses: Swatinem/rust-cache@v2

      # The suite documented in AGENTS.md, run exactly as a developer would.
      - name: Formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets

      - name: Clippy (debug feature)
        run: cargo clippy --all-targets --features debug

      - name: Tests
        run: cargo test

      - name: Tests (debug feature)
        run: cargo test --features debug

      # Plain `cargo test` compiles the examples but never runs the
      # `#[cfg(test)]` tests inside them, so the example unit tests (geometry,
      # combo/difficulty math, the headless split-into-physics-bodies path,
      # ...) would silently rot. `cargo test --examples` runs only the example
      # targets' tests. No `--features debug` variant: no example test is
      # `#[cfg(feature = "debug")]`, so it would add zero coverage.
      - name: Example tests
        run: cargo test --examples

      - name: Plain-ASCII check
        run: ./scripts/check-ascii.sh

  # The dependency-license gate. The shipped manifest
  # (credits/THIRD-PARTY-LICENSES.md) is GENERATED at release time, not committed
  # (cargo-about's output is not byte-stable, so a committed copy could not be
  # diff-checked). This job just runs the generation and lets it fail:
  # cargo-about exits non-zero if any dependency carries a license outside
  # about.toml's accepted permissive set, so a new copyleft/unknown-license dep
  # is caught on the PR that adds it. No project build needed - cargo-about only
  # reads `cargo metadata` and crate license files - so this is fast and separate
  # from the compile/test gate above.
  licenses:
    name: dependency license gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      # The first cargo invocation auto-installs the rust-toolchain.toml-pinned
      # toolchain that cargo-about's `cargo metadata` runs under.
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-about
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-about
      # Generation fails on any non-accepted license - that failure IS the gate.
      # The output itself is discarded here; the shipped copy is generated in the
      # release workflow.
      - name: Check dependency licenses
        run: cargo about generate about.hbs -o "${RUNNER_TEMP}/third-party-licenses.md"
