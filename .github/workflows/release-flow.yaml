name: release-flow

# bcs is a library, so unlike a game there is no native binary to ship. The one
# compiled artifact it distributes is the WebAssembly web showcase (web/), whose
# wasm statically links the dependency graph. On a v* tag this builds that
# showcase, bundles the third-party license manifest next to it, and attaches the
# zip to the matching GitHub Release - mirroring the nova-protocol release-flow.
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:
    inputs:
      version:
        description: 'Version - in the form of v1.2.3'
        required: true
        type: string

permissions:
  contents: write

jobs:
  get-version:
    runs-on: ubuntu-latest
    steps:
      - name: Get tag
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
    outputs:
      version: ${{ inputs.version || steps.tag.outputs.tag }}

  build-web:
    runs-on: ubuntu-latest
    needs: get-version
    env:
      VERSION: ${{ needs.get-version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Build the web showcase
        env:
          # Served from the archive root once unzipped, so assets resolve at "/".
          PUBLIC_PATH: /
        run: |
          nix develop --command bash -c '
            cd web
            npm ci
            npm run build
          '

      # Generate the third-party dependency-license manifest into the built site
      # so it ships inside the zip. cargo-about fails on any non-accepted license
      # (about.toml), so a copyleft/unknown-license dep blocks the release.
      - name: Install cargo-about
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-about
      - name: Generate third-party license manifest
        run: cargo about generate about.hbs -o web/dist/THIRD-PARTY-LICENSES.md

      - name: Zip release
        uses: vimtor/action-zip@v1.1
        with:
          files: web/dist/
          dest: bevy-common-systems_web.zip

      - name: Upload release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: bevy-common-systems_web.zip
          asset_name: bevy-common-systems_${{ env.VERSION }}_web.zip
          release_name: ${{ env.VERSION }}
          tag: ${{ env.VERSION }}
          overwrite: true
