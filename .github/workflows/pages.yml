name: Deploy web showcase to GitHub Pages

# Deploys on push to master (skipping pure docs/tasks changes, which do not
# affect the built site), and can also be run manually from the Actions tab.
# Note: requires Pages to be enabled in repo Settings (Source: GitHub Actions).
on:
  push:
    branches: [master]
    paths-ignore:
      - 'docs/**'
      - 'tasks/**'
      - '**/*.md'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Build the site
        env:
          # Repo name as the Pages subpath, e.g. "/bevy-common-systems/".
          PUBLIC_PATH: /${{ github.event.repository.name }}/
        run: |
          nix develop --command bash -c '
            cd web
            npm ci
            npm run build
          '

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
