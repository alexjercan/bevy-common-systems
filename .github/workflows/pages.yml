name: Deploy web showcase to GitHub Pages

# Deploys on push to master (skipping pure docs/tasks changes, which do not
# affect the built site), and can also be run manually from the Actions tab.
# Note: requires Pages to be enabled in repo Settings (Source: GitHub Actions).
on:
  push:
    branches: [master]
    paths-ignore:
      - 'docs/**'
      - 'tasks/**'
      - '**/*.md'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Build the site
        env:
          # Repo name as the Pages subpath, e.g. "/bevy-common-systems/".
          PUBLIC_PATH: /${{ github.event.repository.name }}/
        run: |
          nix develop --command bash -c '
            cd web
            npm ci
            npm run build
          '

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # The Pages API sync (actions/deploy-pages) intermittently returns a
    # transient "Deployment failed, try again later." after "syncing_files",
    # even when the uploaded artifact is fine; re-running the job succeeds. Cap
    # the job so a hung sync cannot run forever (the action's own timeout is
    # 600s) while still leaving room for the automatic retry below.
    timeout-minutes: 15
    environment:
      name: github-pages
      # Report the URL from whichever attempt actually deployed the site.
      url: ${{ steps.deployment-retry.outputs.page_url || steps.deployment.outputs.page_url }}
    steps:
      # First attempt: do not fail the job on a transient Pages API error, so
      # the retry step below gets a chance to run.
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      # Retry once on a transient "try again later" failure. Most transient
      # Pages sync errors clear on a second attempt; this keeps the workflow
      # green without a manual re-run. If this attempt also fails the job goes
      # red, so a genuinely broken deploy is still surfaced.
      - id: deployment-retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
